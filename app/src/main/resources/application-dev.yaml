spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: create-only

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true

jwt:
  access-duration: ${JWT_DURATION}
  refresh-duration: ${JWT_REFRESH_DURATION}
  secret: ${JWT_SECRET}

chirrup:
  verification:
    duration: 24
